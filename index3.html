<!DOCTYPE html>
<html lang="ru" style="color-scheme: light;">

<head>
    <meta charset="UTF-8">
    <title>Мелодии праздника</title>
</head>

<body style="background-color: #ffffff; color: #000000; margin: 0; padding: 40px; font-family: sans-serif;">

    <div style="max-width: 600px; margin: 0 auto; text-align: center;">
        <a href="index.html"
            style="color: blue; text-decoration: underline; font-size: 14px; display: block; margin-bottom: 20px;">назад
            к квизу</a>

        <h1 style="font-size: 24px; margin-bottom: 30px;">А ЧТО ЛЮБЯТ СЛУШАТЬ НАШИ ДЕВУШКИ</h1>

        <div id="songs-list"></div>
    </div>

    <script>
        const songsList = [
            "Валерий Меладзе - Красиво",
            "Валерий Меладзе - Салют, Вера",
            "Валерий Меладзе - Притяженья больше нет",
            "Валерий Меладзе - Океан и три реки",
            "Валерий Меладзе - Небеса",
            "Валерий Меладзе - Девушка из высшего общества",
            "Валерий Меладзе - Тропикана-женщина",
            "Валерий Меладзе - Сэра",
            "Валерий Меладзе - Иностранец",
            "Валерий Меладзе - Вопреки"
        ];

        const placeholder = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        const container = document.getElementById('songs-list');
        let currentAudio = null;
        let currentBtn = null;

        songsList.forEach((song, i) => {
            const card = document.createElement('div');
            card.style.border = "1px solid #ccc";
            card.style.borderRadius = "8px";
            card.style.padding = "15px";
            card.style.marginBottom = "15px";
            card.style.textAlign = "left";
            card.style.backgroundColor = "#f9f9f9";

            card.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <button id="btn-${i}" style="padding: 8px 16px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px;" onclick="playSong(${i})">PLAY</button>
                    <div style="flex: 1; height: 8px; background: #ddd; border-radius: 4px; overflow: hidden;">
                        <div id="bar-${i}" style="height: 100%; background: red; width: 0%;"></div>
                    </div>
                    <span id="time-${i}" style="font-size: 12px;">00:00</span>
                </div>
                <div style="border-top: 1px solid #eee; padding-top: 10px;">
                    <button style="font-size: 11px; padding: 4px 8px; cursor: pointer;" onclick="document.getElementById('text-${i}').style.display = (document.getElementById('text-${i}').style.display === 'block' ? 'none' : 'block')">УЗНАТЬ НАЗВАНИЕ</button>
                    <div id="text-${i}" style="display: none; margin-top: 8px; font-weight: bold; font-size: 16px; color: black;">${song}</div>
                </div>
                <audio id="audio-${i}" src="${placeholder}"></audio>
            `;
            container.appendChild(card);

            const audio = document.getElementById('audio-' + i);
            audio.ontimeupdate = () => {
                const bar = document.getElementById('bar-' + i);
                const time = document.getElementById('time-' + i);
                bar.style.width = (audio.currentTime / 15 * 100) + '%';
                time.innerText = '00:' + Math.floor(audio.currentTime).toString().padStart(2, '0');
                if (audio.currentTime >= 15) {
                    audio.pause();
                    audio.currentTime = 0;
                    document.getElementById('btn-' + i).innerText = 'PLAY';
                }
            };
        });

        window.playSong = (i) => {
            const audio = document.getElementById('audio-' + i);
            const btn = document.getElementById('btn-' + i);
            if (currentAudio && currentAudio !== audio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentBtn.innerText = 'PLAY';
            }
            if (audio.paused) {
                audio.play();
                btn.innerText = 'PAUSE';
                currentAudio = audio;
                currentBtn = btn;
            } else {
                audio.pause();
                btn.innerText = 'PLAY';
            }
        };
    </script>
</body>

</html>
