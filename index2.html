<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особый раздел</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .section-light {
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
        }

        .section-dark {
            background-color: #050505;
            color: #ffffff;
            border-top: 1px solid #1e293b;
        }


        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            margin-bottom: 30px;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
        }

        .spoiler {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .section-light .spoiler {
            background: white;
            border-color: #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .spoiler-header {
            padding: 20px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            background: rgba(0, 0, 0, 0.02);
        }

        .spoiler-content {
            max-height: 0;
            padding: 0 20px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
        }

        .spoiler.open .spoiler-content {
            max-height: 200px;
            padding: 30px 20px;
            opacity: 1;
        }

        .section-dark .spoiler-header {
            color: #94a3b8;
        }

        .section-dark .spoiler-content {
            color: #ef4444;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }

        .section-dark .spoiler-content::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('crying_man.png');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
            border-radius: 0 0 12px 12px;
        }

        .section-light .spoiler-content {
            color: #db2777;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0.6;
            z-index: 10;
        }

        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Вернуться к Квизу</a>

    <div class="section section-light">
        <h1>Если у вас гендерный праздник</h1>
        <div class="spoiler" onclick="this.classList.toggle('open')">
            <div class="spoiler-header">Нажмите, чтобы узнать результат</div>
            <div class="spoiler-content">Вы получаете один бал</div>
        </div>
    </div>

    <div class="section section-dark">
        <h1>Если у вас нет сегодня гендерного праздника</h1>
        <div class="spoiler" onclick="this.classList.toggle('open')">
            <div class="spoiler-header">Нажмите на свой страх и риск</div>
            <div class="spoiler-content">
                Вам достаётся просто горькая пилюля правды что вас никто не поздравил с вашим праздниом.
            </div>
        </div>
    </div>

    <script>
        // Simple analytics or logic if needed, currently just empty
    </script>
</body>

</html>
